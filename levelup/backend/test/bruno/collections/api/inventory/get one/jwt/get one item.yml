info:
  name: get one item
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:5000/api/v1/inventory/{{inventory_item_id}}
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: length
      value: "36"
    - expression: res.body.product_id
      operator: length
      value: "36"
    - expression: res.body.state
      operator: isString
    - expression: res.body.product_details
      operator: isObject

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
