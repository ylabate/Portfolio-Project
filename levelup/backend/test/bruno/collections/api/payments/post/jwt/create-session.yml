info:
  name: create session
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:5000/api/v1/payments/create-session
  body:
    type: json
    data: |-
      {
        "user_id": "00000000-0000-0000-0000-000000000001",
        "order_id": "00000000-0000-0000-0000-000000000001",
        "items": [
          {
            "product_id": "00000000-0000-0000-0000-000000000002",
            "quantity": 1
          }
        ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.url
      operator: contains
      value: https://checkout.stripe.com
    - expression: res.body.id
      operator: startsWith
      value: cs_test

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
