info:
  name: health check
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:5000/health

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isJson
    - expression: res.body.status
      operator: eq
      value: ok

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
