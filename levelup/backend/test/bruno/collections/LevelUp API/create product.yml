info:
  name: create product
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:5000/api/v1/products
  body:
    type: json
    data: |-
      {
          "product_name": "The Witcher 3",
          "product_thumbnail_link": "https://cdn.cloudflare.steamstatic.com/steam/apps/292030/header.jpg",
          "type": "key",
          "price": 19.99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
