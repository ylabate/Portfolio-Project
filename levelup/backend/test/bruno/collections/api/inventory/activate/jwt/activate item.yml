info:
  name: activate item
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:5000/api/v1/inventory/{{inventory_item_id}}/activate
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.metadata
      operator: isObject
    - expression: res.body.metadata.id
      operator: length
      value: "36"
    - expression: res.body.metadata.activation_code
      operator: isString
    - expression: res.body.metadata.is_used
      operator: eq
      value: "true"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
