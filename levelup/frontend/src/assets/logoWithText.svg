<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B0082" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#D8BFD8" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="neonGlowText" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="500" height="500" rx="40" fill="#120E1A" />

  <g transform="translate(250, 210) scale(1.2) translate(-250, -230)">
    <g transform="translate(0, 10)" filter="url(#neonGlow)">
      <path d="M 150 340 L 250 240 L 350 340 L 310 370 L 250 310 L 190 370 Z"
            fill="url(#purpleGrad)"
            opacity="0.6" />

      <path d="M 150 250 L 250 150 L 350 250 L 310 280 L 250 220 L 190 280 Z"
            fill="url(#purpleGrad)"
            opacity="0.8" />

      <path d="M 150 160 L 250 60 L 350 160 L 310 190 L 250 130 L 190 190 Z"
            fill="url(#purpleGrad)" />
    </g>

    <rect x="120" y="200" width="15" height="15" fill="#8A2BE2" opacity="0.4" transform="rotate(45 120 200)"/>
    <rect x="380" y="150" width="20" height="20" fill="#D8BFD8" opacity="0.7" transform="rotate(15 380 150)"/>
    <circle cx="360" cy="300" r="8" fill="#8A2BE2" opacity="0.5" />
  </g>

  <text x="250" y="465"
        filter="url(#neonGlowText)"
        text-anchor="middle"
        fill="#FFFFFF"
        font-family="'Montserrat', 'Segoe UI', 'Arial Black', sans-serif"
        font-weight="900"
        font-size="70"
        letter-spacing="6">
    <tspan fill="url(#purpleGrad)">LevelUp</tspan>
  </text>
</svg>
