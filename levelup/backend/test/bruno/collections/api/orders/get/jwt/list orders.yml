info:
  name: list orders
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:5000/api/v1/orders
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body[0].id
      operator: length
      value: "36"
    - expression: res.body[0].user_id
      operator: length
      value: "36"
    - expression: res.body[0].total_cents
      operator: isNumber
    - expression: res.body[0].total
      operator: isNumber
    - expression: res.body[0].created_at
      operator: isString
    - expression: res.body[0].items
      operator: isArray
    - expression: res.body[0].items[0].id
      operator: length
      value: "36"
    - expression: res.body[0].items[0].product_id
      operator: length
      value: "36"
    - expression: res.body[0].items[0].product_name
      operator: isString
    - expression: res.body[0].items[0].quantity
      operator: isNumber
    - expression: res.body[0].items[0].price_at_purchase
      operator: isNumber

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
