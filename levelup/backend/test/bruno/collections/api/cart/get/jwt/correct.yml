info:
  name: correct
  type: http
  seq: 1

http:
  method: GET
  url: http://127.0.0.1:5000/api/v1/cart
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: length
      value: "36"
    - expression: res.body.user_id
      operator: eq
      value: 00000000-0000-0000-0000-000000000001
    - expression: res.body.items[0].id
      operator: length
      value: "36"
    - expression: res.body.items[0].price
      operator: isNumber
    - expression: res.body.items[0].product_id
      operator: length
      value: "36"
    - expression: res.body.items[0].product_name
      operator: isString
    - expression: res.body.items[0].product_thumbnail_alt
      operator: isString
    - expression: res.body.items[0].product_thumbnail_link
      operator: contains
      value: https://
    - expression: res.body.items[0].quantity
      operator: isNumber
    - expression: res.body.items[0].product_genres
      operator: isArray
    - expression: res.body.items[0].product_genres[0].id
      operator: length
      value: "36"
    - expression: res.body.items[0].product_genres[0].name
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
