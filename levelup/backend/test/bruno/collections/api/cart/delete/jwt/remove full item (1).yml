info:
  name: remove full item (1)
  type: http
  seq: 3

http:
  method: DELETE
  url: http://127.0.0.1:5000/api/v1/cart/items/00000000-0000-0000-0000-000000000000
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body.message
      operator: eq
      value: Product not found in cart

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
